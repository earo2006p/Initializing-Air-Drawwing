<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Drawing App</title>
    <!-- MediaPipe Hands & Camera Utils -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        /* ========== RESET & BASE ========== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
        }

        /* ========== LAYOUT ========== */
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
        }

        /* ========== CANVAS ========== */
        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: none;
        }

        /* ========== VIDEO (Hidden) ========== */
        #inputVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ========== UI OVERLAY ========== */
        .ui-overlay {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 280px;
            max-width: 90vw;
        }

        .glass-panel {
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            box-shadow: 0 8px 40px rgba(0, 255, 255, 0.08);
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
            letter-spacing: 1px;
        }

        /* ========== STATUS INDICATOR ========== */
        .status-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.8rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            box-shadow: 0 0 8px currentColor;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .status-dot.draw { background: #00e5ff; box-shadow: 0 0 12px #00e5ff; }
        .status-dot.erase { background: #ff1744; box-shadow: 0 0 12px #ff1744; }
        .status-dot.pause { background: #ffea00; box-shadow: 0 0 12px #ffea00; }
        .status-dot.idle { background: #555; box-shadow: none; }

        .status-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: #ccc;
        }

        /* ========== CONTROLS ========== */
        .control-group {
            margin-bottom: 1rem;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Color Picker */
        input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 3px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
        }

        input[type="color"]::-webkit-color-swatch {
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
        }

        /* Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            margin-top: 0.3rem;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00e5ff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            border: 2px solid #fff;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00e5ff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            border: 2px solid #fff;
        }

        .slider-value {
            display: inline-block;
            margin-top: 0.3rem;
            font-size: 0.85rem;
            color: #00e5ff;
            font-weight: 600;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 0.7rem 1rem;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .btn-clear {
            background: linear-gradient(135deg, #ff1744 0%, #d50000 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.3);
        }

        .btn-clear:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 23, 68, 0.5);
        }

        .btn-clear:active {
            transform: translateY(0);
        }

        /* ========== GESTURE LEGEND ========== */
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #bbb;
        }

        .legend-icon {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
        }

        .legend-text strong {
            color: #fff;
        }

        /* ========== LOADING SCREEN ========== */
        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 229, 255, 0.15);
            border-top-color: #00e5ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.1rem;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .loading-subtext {
            font-size: 0.85rem;
            color: #666;
        }

        /* ========== WEBCAM PREVIEW (Small) ========== */
        #webcamPreview {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            width: 160px;
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            background: #000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        #webcamPreview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror */
        }

        .preview-label {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 8px;
            border-radius: 10px;
            pointer-events: none;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .ui-overlay {
                width: 220px;
                top: 0.5rem;
                left: 0.5rem;
            }

            .glass-panel {
                padding: 0.9rem;
                border-radius: 12px;
            }

            .panel-title {
                font-size: 1rem;
            }

            #webcamPreview {
                width: 120px;
                height: 90px;
                bottom: 0.5rem;
                right: 0.5rem;
            }
        }

        /* ========== NEON CURSOR ========== */
        .cursor-ring {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00e5ff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #00e5ff, inset 0 0 10px rgba(0, 229, 255, 0.3);
            transition: width 0.2s, height 0.2s, border-color 0.3s;
        }

        .cursor-ring.erase {
            border-color: #ff1744;
            box-shadow: 0 0 15px #ff1744, inset 0 0 10px rgba(255, 23, 68, 0.3);
            width: 40px;
            height: 40px;
        }

        .cursor-ring.pause {
            border-color: #ffea00;
            box-shadow: 0 0 15px #ffea00;
            width: 12px;
            height: 12px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loadingScreen">
            <div class="spinner"></div>
            <div class="loading-text">Initializing Air Drawing</div>
            <div class="loading-subtext">Please allow camera access</div>
        </div>

        <!-- Video Input (Hidden, used by MediaPipe) -->
        <video id="inputVideo" playsinline></video>

        <!-- Drawing Canvas -->
        <canvas id="drawCanvas"></canvas>

        <!-- Custom Cursor -->
        <div id="cursorRing" class="cursor-ring" style="display:none;"></div>

        <!-- UI Overlay -->
        <div class="ui-overlay">
            <div class="glass-panel">
                <div class="panel-title">Air Drawing</div>

                <div class="status-row">
                    <div id="statusDot" class="status-dot idle"></div>
                    <div id="statusText" class="status-text">No hand detected</div>
                </div>

                <div class="control-group">
                    <label class="control-label" for="colorPicker">Brush Color</label>
                    <input type="color" id="colorPicker" value="#00e5ff">
                </div>

                <div class="control-group">
                    <label class="control-label" for="brushSize">Brush Thickness</label>
                    <input type="range" id="brushSize" min="2" max="30" value="6">
                    <span class="slider-value" id="brushSizeValue">6px</span>
                </div>

                <button id="clearBtn" class="btn btn-clear">Clear Canvas</button>
            </div>

            <div class="glass-panel">
                <div class="panel-title" style="font-size:1rem; color:#ffea00;">Gestures</div>
                <div class="legend-item">
                    <span class="legend-icon">☝️</span>
                    <span class="legend-text"><strong>One Finger</strong> &mdash; Draw</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon">✋</span>
                    <span class="legend-text"><strong>Open Palm</strong> &mdash; Erase</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon">✊</span>
                    <span class="legend-text"><strong>Closed Fist</strong> &mdash; Pause</span>
                </div>
            </div>
        </div>

        <!-- Webcam Preview -->
        <div id="webcamPreview">
            <video id="previewVideo" autoplay playsinline muted></video>
            <div class="preview-label">Camera</div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const CONFIG = {
            smoothFactor: 0.25,      // Lower = smoother but more lag (0-1)
            minDrawDist: 2,          // Minimum pixels to draw
            glowBlur: 15,            // Neon glow amount
            fadeOnErase: false       // If true, erase fades instead of instant clear
        };

        // ========== DOM ELEMENTS ==========
        const videoElement = document.getElementById('inputVideo');

        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const cursorRing = document.getElementById('cursorRing');

        const statusText = document.getElementById('statusText');
        const colorPicker = document.getElementById('colorPicker');
        const brushSizeSlider = document.getElementById('brushSize');
        const brushSizeValue = document.getElementById('brushSizeValue');
        const clearBtn = document.getElementById('clearBtn');
        const loadingScreen = document.getElementById('loadingScreen');

        // ========== STATE ==========
        let isDrawing = false;
        let currentMode = 'idle'; // 'draw', 'erase', 'pause', 'idle'
        let lastX = null;
        let lastY = null;
        let smoothedX = null;
        let smoothedY = null;
        let brushColor = colorPicker.value;
        let brushSize = parseInt(brushSizeSlider.value);

        // ========== CANVAS SETUP ==========
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Keep existing content if resizing
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ========== UI EVENTS ==========
        colorPicker.addEventListener('input', (e) => {
            brushColor = e.target.value;
        });

        brushSizeSlider.addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            brushSizeValue.textContent = brushSize + 'px';
        });

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // ========== STATUS UPDATE ==========
        function updateStatus(mode, text) {
            currentMode = mode;
            statusDot.className = 'status-dot ' + mode;
            statusText.textContent = text;

            cursorRing.className = 'cursor-ring';
            if (mode === 'erase') cursorRing.classList.add('erase');
            else if (mode === 'pause') cursorRing.classList.add('pause');
        }

        // ========== GESTURE DETECTION ==========
        // Finger landmark indices in MediaPipe Hands:
        // 0: wrist
        // Thumb: 1-4, Index: 5-8, Middle: 9-12, Ring: 13-16, Pinky: 17-20

        function isFingerExtended(landmarks, fingerTipIdx, fingerPipIdx) {
            // A finger is extended if tip is farther from wrist than PIP joint
            const wrist = landmarks[0];
            const tip = landmarks[fingerTipIdx];
            const pip = landmarks[fingerPipIdx];

            const tipDist = Math.hypot(tip.x - wrist.x, tip.y - wrist.y);
            const pipDist = Math.hypot(pip.x - wrist.x, pip.y - wrist.y);

            return tipDist > pipDist;
        }

        function detectGesture(landmarks) {
            const indexUp = isFingerExtended(landmarks, 8, 6);
            const middleUp = isFingerExtended(landmarks, 12, 10);
            const ringUp = isFingerExtended(landmarks, 16, 14);
            const pinkyUp = isFingerExtended(landmarks, 20, 18);
            // Thumb is tricky, we'll ignore it for simple gestures

            const extendedCount = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;

            if (extendedCount === 0) {
                return 'pause'; // Closed fist
            } else if (extendedCount >= 3) {
                return 'erase'; // Open palm
            } else if (extendedCount === 1 && indexUp) {
                return 'draw'; // Only index finger up
            } else {
                return 'pause'; // Other configurations = pause
            }
        }

        function drawLine(x1, y1, x2, y2) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = brushColor;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = CONFIG.glowBlur;
            ctx.shadowColor = brushColor;
            ctx.stroke();
            ctx.restore();
        }

            // Erase entire canvas for open palm
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

            }
        });
